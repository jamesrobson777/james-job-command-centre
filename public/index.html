<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAMES.JOBS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<style>
:root{--bg:#F2F0EB;--card:#fff;--card-h:#FAFAF7;--tx:#1A1A1A;--tx2:#5A5A56;--txm:#9A9A94;--or:#FF5500;--or-l:#FFF0E8;--bd:#D4D2CC;--bk:#1A1A1A;--gn:#00AA44;--gn-bg:#E6F7ED;--am:#DD8800;--am-bg:#FFF5E0;--rd:#DD2222;--rd-bg:#FFECEC;--r:12px;--bw:2px;--mono:'Space Mono',monospace;--sans:'Space Grotesk',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);line-height:1.6;-webkit-font-smoothing:antialiased}
nav{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:var(--bw) solid var(--bk);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--mono);font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:2px;display:flex;align-items:center;gap:10px}
.dot{width:10px;height:10px;background:var(--or);border-radius:50%;display:inline-block}
.nav-links{display:flex;gap:6px}
.nav-btn{background:none;border:var(--bw) solid transparent;border-radius:100px;cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--txm);letter-spacing:1px;text-transform:uppercase;padding:8px 18px;transition:all .15s}
.nav-btn:hover{color:var(--tx);border-color:var(--bd)}
.nav-btn.active{color:#fff;background:var(--or);border-color:var(--or)}
main{max-width:1080px;margin:0 auto;padding:40px 24px}
.mod-label{font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--txm);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.num{font-family:var(--mono);font-size:10px;font-weight:700;background:var(--bk);color:var(--bg);padding:2px 6px;border-radius:3px;letter-spacing:0}
.num.or{background:var(--or);color:#fff}

/* HOME */
.hero{text-align:center;padding:48px 0 40px}
.hero h1{font-size:52px;font-weight:700;letter-spacing:-2px;margin-bottom:12px;line-height:1.05}
.hero h1 .o{color:var(--or)}
.hero p{font-size:15px;color:var(--tx2);max-width:440px;margin:0 auto 40px;line-height:1.7}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:40px}
.stat{background:var(--card);border:var(--bw) solid var(--bk);border-radius:var(--r);padding:18px 16px;text-align:center}
.stat-v{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--or)}
.stat-l{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--txm);margin-top:4px}
.cats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cat{background:var(--card);border:var(--bw) solid var(--bk);border-radius:var(--r);padding:24px 20px;cursor:pointer;transition:all .15s}
.cat:hover{background:var(--or);color:#fff;border-color:var(--or)}
.cat:hover p{color:rgba(255,255,255,.8)}.cat:hover .cat-ct{color:#fff}
.cat:hover .cat-n{background:#fff;color:var(--or)}
.cat:hover svg path,.cat:hover svg line,.cat:hover svg rect,.cat:hover svg circle{stroke:#fff !important}
.cat-n{font-family:var(--mono);font-size:10px;font-weight:700;background:var(--or);color:#fff;padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:14px;letter-spacing:1px}
.cat h3{font-size:20px;font-weight:700;margin-bottom:8px;letter-spacing:-.5px}
.cat p{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:16px}
.cat-ct{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--or);text-transform:uppercase;letter-spacing:1px}

/* LIST */
.view-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:var(--bw) solid var(--bk)}
.view-hdr h2{font-size:28px;font-weight:700;letter-spacing:-1px}
.view-hdr h2 .o{color:var(--or)}
.back{background:var(--card);border:var(--bw) solid var(--bk);border-radius:100px;padding:8px 18px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--tx);cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:1px}
.back:hover{background:var(--or);color:#fff;border-color:var(--or)}
.jlist{display:flex;flex-direction:column;gap:6px}
.jcard{background:var(--card);border:var(--bw) solid var(--bk);border-radius:var(--r);padding:18px 20px;display:grid;grid-template-columns:56px 1fr auto;gap:18px;align-items:center;cursor:pointer;transition:all .15s}
.jcard:hover{border-color:var(--or);box-shadow:4px 4px 0 var(--or);transform:translate(-2px,-2px)}
.fs{width:52px;height:52px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:20px;font-weight:700;flex-shrink:0;border:var(--bw) solid}
.fs-h{background:var(--gn-bg);color:var(--gn);border-color:var(--gn)}
.fs-m{background:var(--am-bg);color:var(--am);border-color:var(--am)}
.fs-l{background:var(--rd-bg);color:var(--rd);border-color:var(--rd)}
.ji h4{font-size:15px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
.jm{font-size:13px;color:var(--tx2);display:flex;gap:14px;flex-wrap:wrap}
.jm strong{color:var(--or)}
.jtags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.tag{font-family:var(--mono);font-size:9px;font-weight:700;padding:4px 10px;border-radius:4px;text-transform:uppercase;letter-spacing:.8px;background:var(--bg);color:var(--tx2);border:1px solid var(--bd)}
.tag-g{background:var(--gn-bg);color:var(--gn);border-color:rgba(0,170,68,.3)}
.tag-r{background:var(--rd-bg);color:var(--rd);border-color:rgba(221,34,34,.3)}
.jarr{font-family:var(--mono);color:var(--txm);font-size:16px;font-weight:700;transition:all .15s}
.jcard:hover .jarr{color:var(--or);transform:translateX(4px)}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:24px}
.tab{background:var(--card);border:var(--bw) solid var(--bk);border-radius:100px;padding:10px 20px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--txm);cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.5px}
.tab:hover{color:var(--tx)}.tab.active{background:var(--or);color:#fff;border-color:var(--or)}

/* DETAIL */
.dgrid{display:grid;grid-template-columns:1fr 340px;gap:16px}
.dmain{display:flex;flex-direction:column;gap:12px}
.dside{display:flex;flex-direction:column;gap:12px}
.dsec{background:var(--card);border:var(--bw) solid var(--bk);border-radius:var(--r);padding:22px}
.dsec h3{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--txm);margin-bottom:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.dsec p,.dsec li{font-size:14px;line-height:1.7;color:var(--tx2)}
.dsec ul{padding-left:16px}.dsec li{margin-bottom:6px}
.dh h2{font-size:24px;font-weight:700;margin-bottom:8px;line-height:1.3;letter-spacing:-.5px}
.cl{font-size:14px;color:var(--tx2)}.cl strong{color:var(--or);font-weight:700}

/* FIT */
.fov{display:flex;align-items:center;gap:18px;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--bd)}
.fbig{width:68px;height:68px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:28px;font-weight:700;flex-shrink:0;border:var(--bw) solid}
.ft h4{font-size:15px;font-weight:700;margin-bottom:2px}.ft p{font-size:12px;color:var(--txm)}
.fbg{margin-bottom:12px}
.fbl{display:flex;justify-content:space-between;margin-bottom:5px;font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.fbar{height:8px;background:var(--bg);border:1px solid var(--bd);border-radius:4px;overflow:hidden}
.fbf{height:100%;border-radius:3px;transition:width .8s}
.fbf-h{background:var(--gn)}.fbf-m{background:var(--am)}.fbf-l{background:var(--rd)}

/* REFRESH BTN - bottom of page, acts as "water surface" */
.refresh-section{position:relative;display:flex;flex-direction:column;align-items:center;margin:60px 0 20px;padding-top:20px;overflow:hidden}
.astro-perch{position:relative;width:200px;height:200px;margin-bottom:-24px;z-index:2}
.astro-perch img{width:100%;height:100%;object-fit:contain;animation:astroBob 3s ease-in-out infinite}
@keyframes astroBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.refresh-btn{background:var(--card);border:var(--bw) solid var(--bk);border-radius:100px;padding:16px 40px;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--tx);cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:1.5px;display:inline-flex;align-items:center;gap:10px;position:relative;z-index:3}
.refresh-btn:hover{background:var(--or);color:#fff;border-color:var(--or);box-shadow:4px 4px 0 var(--bk)}
.sea-surface{width:100%;height:4px;background:linear-gradient(90deg,transparent 10%,var(--or) 30%,var(--or) 70%,transparent 90%);opacity:0.25;margin-top:-2px;position:relative;z-index:1}
.sea-depth{width:100%;height:120px;background:linear-gradient(180deg,rgba(255,85,0,0.06) 0%,transparent 100%);position:relative;z-index:0;margin-top:0}
.refresh-btn:active{transform:translateY(4px);box-shadow:none}
.refresh-btn.loading{pointer-events:none;opacity:.7}

/* FISH OVERLAY */
.fish-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;pointer-events:none;opacity:0;transition:opacity .3s}
.fish-overlay.active{opacity:1;pointer-events:auto}
.fish-canvas{width:100%;height:100%}

/* IMPROVEMENT */
.imp{background:var(--or);color:#fff;border:var(--bw) solid var(--or);border-radius:var(--r);padding:20px}
.imp h3{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.7);margin-bottom:14px;font-weight:700}
.imp-arr{display:flex;align-items:center;gap:12px;margin-bottom:14px;font-family:var(--mono);font-size:28px;font-weight:700}
.imp-arr .from{opacity:.6}.imp-arr .to{color:#fff}
.imp ul{font-size:13px;color:rgba(255,255,255,.85);line-height:1.7;padding-left:16px}
.imp li{margin-bottom:6px}
.ibanner{background:var(--gn-bg);border:var(--bw) solid var(--gn);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gn);text-transform:uppercase;letter-spacing:1px}

/* COVER */
.clprev{background:var(--card);border:var(--bw) solid var(--bk);border-radius:var(--r);padding:28px;font-size:14px;line-height:1.8;color:var(--tx2);white-space:pre-wrap}
.clprev .gr{font-weight:700;color:var(--tx);margin-bottom:12px}
.clprev .so{margin-top:16px;color:var(--tx);font-weight:600}

/* BUTTONS */
.btn-p{background:var(--bk);color:var(--card);border:var(--bw) solid var(--bk);border-radius:100px;padding:14px 24px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s;text-transform:uppercase;width:100%;text-align:center;display:block;text-decoration:none}
.btn-p:hover{background:var(--or);border-color:var(--or);color:#fff;box-shadow:3px 3px 0 var(--bk)}
.btn-s{background:var(--card);color:var(--tx);border:var(--bw) solid var(--bk);border-radius:100px;padding:12px 20px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s;text-transform:uppercase;width:100%}
.btn-s:hover{background:var(--or);color:#fff;border-color:var(--or)}
.btn-a{background:#fff;color:var(--or);border:var(--bw) solid #fff;border-radius:100px;padding:12px 20px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s;text-transform:uppercase;width:100%}
.btn-a:hover{background:var(--bk);color:#fff;border-color:var(--bk)}
.dadd{font-family:var(--mono);font-size:10px;font-weight:700;background:var(--gn-bg);color:var(--gn);padding:3px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
.warn{display:flex;align-items:flex-start;gap:10px;background:var(--rd-bg);border:var(--bw) solid var(--rd);border-radius:var(--r);padding:14px 16px;font-size:13px;color:var(--rd);line-height:1.5}
.warn-i{font-family:var(--mono);font-size:11px;font-weight:700;background:var(--rd);color:#fff;padding:2px 7px;border-radius:3px;flex-shrink:0}
.sub{font-family:var(--mono);font-size:10px;color:var(--txm);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
@media(max-width:768px){.cats{grid-template-columns:1fr}.dgrid{grid-template-columns:1fr}.hero h1{font-size:32px}.stats{grid-template-columns:repeat(2,1fr)}main{padding:24px 16px}nav{padding:10px 16px}}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fu .3s ease forwards}
</style>
</head>
